# Mosquitto broker - Cupcake Animatrónico
# Red local, sin autenticación

# Debe ir antes de los listeners en Mosquitto 2.x
# Puerto TCP estándar (ESP32 + Backend se conectan aquí)
listener 1883
allow_anonymous true

# Puerto WebSocket (Frontend React se conecta aquí)
listener 9001
protocol websockets
allow_anonymous true

# Logs
log_type error
log_type warning
log_type notice
log_type information
